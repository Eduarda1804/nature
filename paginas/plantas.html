    <main>
        <h1>Tipos de plantas</h1>
        <section>
            <article>
                <figure>
                    <img src="../imagens/plantas/costela.png" alt="Costela de adão">
                    <figcaption>
                        <h2>Costela-de-adão</h2>
                        <p><strong>Sobre ela:</strong><br>
                            Planta tropical famosa por suas folhas grandes e recortadas, muito usada na decoração de
                            interiores.</p>
                        <p><strong>Combina com:</strong><br>
                            Quem gosta de ambientes modernos e quer uma planta de destaque.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/plantas/espada.png" alt="Espada-de-São-Jorge">
                    <figcaption>
                        <h2>Espada-de-São-Jorge</h2>
                        <p><strong>Sobre ela:</strong><br>
                            Uma das plantas mais resistentes e populares, conhecida por sua durabilidade e beleza.</p>
                        <p><strong>Combina com:</strong><br>
                            Pessoas iniciantes, com rotina corrida ou que esquecem de regar as plantas.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/plantas/samambaia.png" alt="Samambaia">
                    <figcaption>
                        <h2>Samambaia</h2>
                        <p><strong>Sobre ela:</strong><br>
                            Planta ornamental com folhas longas e volumosas, trazendo frescor aos ambientes.</p>
                        <p><strong>Combina com:</strong><br>
                            Quem gosta de cuidar das plantas e quer deixar a casa mais aconchegante e verde.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/plantas/suculenta.png" alt="Suculenta">
                    <figcaption>
                        <h2>Suculenta</h2>
                        <p><strong>Sobre ela:</strong><br>
                            Planta pequena e versátil que armazena água nas folhas, existindo em diversas formas e
                            cores.
                        </p>
                        <p><strong>Combina com:</strong><br>
                            Pessoas que estão começando a cultivar plantas ou que procuram uma opção prática.</p>
                    </figcaption>
                </figure>
            </article>
