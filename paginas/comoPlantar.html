    <main>
        <h1>Como Plantar</h1>

        <section>
            <article>
                <figure>
                    <img src="../imagens/comoPlantar/muda.png" alt="Muda de planta">
                    <figcaption>
                        <h2>Escolha da muda</h2>
                        <p><strong>Primeiro passo:</strong><br>
                            Escolha uma muda saudável, com folhas firmes, sem manchas e sem sinais de pragas.</p>

                        <p><strong>Dica:</strong><br>
                            Prefira plantas adequadas ao espaço disponível, seja ele interno, externo, com sol direto ou
                            meia sombra.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/comoPlantar/terra.png" alt="Terra para plantio">
                    <figcaption>
                        <h2>Preparo da terra</h2>
                        <p><strong>Sobre o solo:</strong><br>
                            A terra deve ser leve, rica em nutrientes e com boa drenagem para evitar o acúmulo de água.
                        </p>

                        <p><strong>Dica:</strong><br>
                            Misturar terra vegetal com composto orgânico ajuda a planta a crescer mais forte.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/comoPlantar/mudaPlantada.png" alt="Muda plantada">
                    <figcaption>
                        <h2>Plantio no vaso</h2>
                        <p><strong>Como fazer:</strong><br>
                            Coloque uma camada de drenagem no fundo do vaso, adicione terra e posicione a muda com
                            cuidado.</p>

                        <p><strong>Dica:</strong><br>
                            Após plantar, aperte levemente a terra ao redor da muda para deixá-la firme.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/comoPlantar/primeiraRega.png" alt="Planta sendo regada">
                    <figcaption>
                        <h2>Primeira rega</h2>
                        <p><strong>Depois do plantio:</strong><br>
                            Regue a planta com cuidado, sem encharcar. A água deve umedecer a terra, não formar poças.
                        </p>

                        <p><strong>Dica:</strong><br>
                            Nos primeiros dias, observe se a planta está se adaptando bem ao novo ambiente.</p>
                    </figcaption>
                </figure>
            </article>
