    <main>
        <h1>Cuidados com Plantas</h1>

        <section>
            <article>
                <figure>
                    <img src="../imagens/cuidados/rega.png" alt="Rega correta da planta">
                    <figcaption>
                        <h2>Rega correta</h2>
                        <p><strong>Sobre a água:</strong><br>
                            Cada planta precisa de uma quantidade diferente de água. Algumas gostam de solo úmido,
                            outras preferem a terra mais seca.</p>

                        <p><strong>Dica:</strong><br>
                            Antes de regar, toque a terra com os dedos. Se ainda estiver úmida, espere mais um pouco.
                        </p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/cuidados/iluminacao.png" alt="Planta recebendo luz">
                    <figcaption>
                        <h2>Iluminação</h2>
                        <p><strong>Sobre a luz:</strong><br>
                            A luz é essencial para o crescimento das plantas, mas nem todas gostam de sol direto.</p>

                        <p><strong>Dica:</strong><br>
                            Observe se as folhas estão queimadas ou amareladas, pois isso pode indicar excesso ou falta
                            de luz.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/cuidados/limpeza.png" alt="Limpeza das folhas da planta">
                    <figcaption>
                        <h2>Limpeza das folhas</h2>
                        <p><strong>Cuidados simples:</strong><br>
                            Folhas limpas absorvem melhor a luz e deixam a planta com uma aparência mais bonita e
                            saudável.</p>

                        <p><strong>Dica:</strong><br>
                            Use um pano levemente úmido para retirar o pó das folhas maiores.</p>
                    </figcaption>
                </figure>
            </article>
            <article>
                <figure>
                    <img src="../imagens/cuidados/adubacao.png" alt="Adubação de muda">
                    <figcaption>
                        <h2>Adubação</h2>
                        <p><strong>Nutrição:</strong><br>
                            A adubação ajuda a repor os nutrientes da terra e fortalece o desenvolvimento da planta.</p>

                        <p><strong>Dica:</strong><br>
                            Utilize adubo orgânico ou próprio para cada tipo de planta, sempre respeitando a quantidade
                            indicada.</p>
                    </figcaption>
                </figure>
            </article>
        </section>
